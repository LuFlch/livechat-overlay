services:
  livechatccb:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: file:/data/sqlite.db
      APP_ENV: ${APP_ENV:-production}
      LOG: ${LOG:-info}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      DISCORD_OWNER_ID: ${DISCORD_OWNER_ID:-}
      API_URL: ${API_URL:-http://localhost:3000}
      DEFAULT_DURATION: ${DEFAULT_DURATION:-5}
      HIDE_COMMANDS_DISABLED: ${HIDE_COMMANDS_DISABLED:-false}
      TZ: Europe/Paris
    volumes:
      - livechat_data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const req=http.request({host:'127.0.0.1',port:process.env.PORT||3000,path:'/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)});req.on('error',()=>process.exit(1));req.end()",
        ]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  livechat_data:

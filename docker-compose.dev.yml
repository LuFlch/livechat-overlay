services:
  livechatccb-dev:
    build: .
    image: livechatccb-dev:latest
    restart: unless-stopped
    ports:
      - '3001:3000'
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: file:/data/sqlite-dev.db
      APP_ENV: ${APP_ENV:-staging}
      LOG: ${LOG:-info}
      TZ: Europe/Paris
    volumes:
      - livechat_dev_data:/data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "const http=require('http');const req=http.request({host:'127.0.0.1',port:process.env.PORT||3000,path:'/health',timeout:2000},r=>{process.exit(r.statusCode===200?0:1)});req.on('error',()=>process.exit(1));req.end()",
        ]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  livechat_dev_data:

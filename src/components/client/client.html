<!doctype html>
<html>
  <head>
    <title>LiveChatCCB</title>
    <script
      src="https://cdn.socket.io/4.7.4/socket.io.min.js"
      integrity="sha384-Gr6Lu2Ajx28mzwyVR8CFkULdCU7kMlZ9UthllibdOSo6qAiN+yXNHqtgdTvFXMT4"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/client/vidstack.theme.css" />
    <link rel="stylesheet" href="/client/vidstack.video.css" />
    <script src="/client/vidstack.js" type="module"></script>
    <style>
      :root {
        color-scheme: dark;
        --scale: 1; /* Set dynamically via JS */
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        pointer-events: none;
      }

      #overlay-root {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      #overlay-stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      #overlay-shell {
        position: relative;
        display: grid;
        gap: calc(14px * var(--scale));
        justify-items: center;
        align-items: center;
      }

      .message-frame {
        position: relative;
        z-index: 1;
        display: grid;
        gap: calc(12px * var(--scale));
        justify-items: center;
      }

      .message-badge {
        display: inline-flex;
        align-items: center;
        gap: calc(8px * var(--scale));
        padding: calc(6px * var(--scale)) calc(12px * var(--scale));
        border-radius: 999px;
        background: rgba(17, 24, 39, 0.74);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
      }

      #author-block {
        display: none;
        align-items: center;
      }

      #author-block img {
        width: calc(32px * var(--scale)) !important;
        height: calc(32px * var(--scale)) !important;
        border-radius: 999px;
        object-fit: cover;
      }

      #author-username {
        font-size: calc(14px * var(--scale));
        font-weight: 700;
        color: #eff6ff;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
      }

      #message-text {
        display: none;
        margin: 0;
        padding: calc(6px * var(--scale)) calc(10px * var(--scale));
        max-width: 100%;
        font-size: calc(2.6rem * var(--scale));
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #ffffff;
        text-align: center;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.5);
      }

      /* Base layout for the media container */
      #message-block {
        display: flex;
        align-items: center;
        justify-content: center;
        width: min(85vw, 960px);
        height: min(48vw, 540px); /* 16:9 normalized dimension default */
        position: relative;
        background: transparent !important;
      }

      /* Style for the wrapper div that gets created for the video player */
      #message-block #message-player {
        width: 100% !important;
        height: 100% !important;
        max-width: 100% !important;
        max-height: 100% !important;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent !important;
      }

      #message-block #message-player.is-short {
        aspect-ratio: 9 / 16 !important;
        width: auto !important;
        height: 100% !important;
      }

      #message-block #message-player.is-short media-player {
        aspect-ratio: 9 / 16 !important;
        width: 100% !important;
        height: 100% !important;
      }

      /* Make all elements inside the player transparent to avoid black bars and glass effects */
      #message-block media-player,
      #message-block [data-media-player],
      #message-block media-provider,
      #message-block [data-media-provider],
      #message-block video,
      #message-block audio {
        background: transparent !important;
        background-color: transparent !important;
        box-shadow: none !important;
      }

      /* Force player and video elements to occupy the full container size */
      #message-block media-provider,
      #message-block video {
        width: 100% !important;
        height: 100% !important;
        max-width: 100% !important;
        max-height: 100% !important;
        object-fit: contain !important;
      }

      /* Hide default Vidstack controls/overlays to ensure no UI frame is visible */
      media-player [data-controls],
      .vds-controls,
      .vds-bezel,
      .vds-buffering-indicator,
      .vds-gestures,
      [data-media-player] .vds-controls-group,
      [data-media-player] .vds-gradient {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }

      /* Consistent aspect-ratio support for player */
      #message-block media-player {
        aspect-ratio: 16 / 9;
      }

      /* Style for image and video content to ensure they render nicely with rounded corners and shadow */
      #message-block img,
      #message-block media-player {
        display: block;
        max-width: 100% !important;
        max-height: 100% !important;
        width: auto !important;
        height: auto !important;
        border-radius: 22px;
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }

      #message-block img {
        object-fit: contain;
      }

      .empty-state {
        display: none;
        color: rgba(226, 232, 240, 0.74);
        text-align: center;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>

  <body>
    <button class="absolute z-50 rounded-full bg-red-500 px-4 text-white pointer-events-auto" id="disappear">
      Click on me so i can disappear <br />(Fix Autoplay, Browser Source > Right Click > Interact / Interragir <br />and
      click on button.)
    </button>

    <div id="overlay-root">
      <div id="overlay-stage">
        <div id="overlay-shell">
          <div class="message-frame">
            <div id="author-block" class="message-badge">
              <div class="w-fit">
                <img id="author-img" src="" alt="" />
              </div>
              <p id="author-username"></p>
            </div>

            <p id="message-text"></p>
            <div id="message-block"></div>
            <div id="empty-state" class="empty-state">LiveChat prêt</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { VidstackPlayer, VidstackPlayerLayout } from '/client/vidstack.js';

      const overlayStage = document.getElementById('overlay-stage');
      const overlayShell = document.getElementById('overlay-shell');
      const emptyState = document.getElementById('empty-state');
      const disappearBtn = document.getElementById('disappear');

      // Check if we are running in the desktop client
      const urlParams = new URLSearchParams(window.location.search);
      const isDesktop = urlParams.get('client') === 'desktop';

      if (isDesktop) {
        if (disappearBtn) {
          disappearBtn.style.display = 'none';
        }
      } else {
        if (disappearBtn) {
          disappearBtn.addEventListener('click', () => {
            disappearBtn.style.display = 'none';
          });
        }
      }

      // Real-time custom width and flex alignment setup
      window.__updateLayoutSettings = function(size, position) {
        const scaleVal = Number(size) / 960;
        document.documentElement.style.setProperty('--scale', scaleVal);

        const messageBlock = document.getElementById('message-block');
        if (messageBlock) {
          messageBlock.style.width = `${size}px`;
          messageBlock.style.height = `calc(${size}px * 9 / 16)`;
        }

        if (overlayStage) {
          overlayStage.style.alignItems = '';
          overlayStage.style.justifyContent = '';
          overlayStage.style.padding = '24px';

          if (position === 'top-left') {
            overlayStage.style.alignItems = 'flex-start';
            overlayStage.style.justifyContent = 'flex-start';
          } else if (position === 'top-center') {
            overlayStage.style.alignItems = 'flex-start';
            overlayStage.style.justifyContent = 'center';
          } else if (position === 'top-right') {
            overlayStage.style.alignItems = 'flex-start';
            overlayStage.style.justifyContent = 'flex-end';
          } else if (position === 'center-left') {
            overlayStage.style.alignItems = 'center';
            overlayStage.style.justifyContent = 'flex-start';
          } else if (position === 'center-right') {
            overlayStage.style.alignItems = 'center';
            overlayStage.style.justifyContent = 'flex-end';
          } else if (position === 'bottom-left') {
            overlayStage.style.alignItems = 'flex-end';
            overlayStage.style.justifyContent = 'flex-start';
          } else if (position === 'bottom-center') {
            overlayStage.style.alignItems = 'flex-end';
            overlayStage.style.justifyContent = 'center';
          } else if (position === 'bottom-right') {
            overlayStage.style.alignItems = 'flex-end';
            overlayStage.style.justifyContent = 'flex-end';
          } else {
            overlayStage.style.alignItems = 'center';
            overlayStage.style.justifyContent = 'center';
          }
        }
      };

      // Mock media formats testing
      window.__triggerTestFormat = function(format) {
        if (format === 'stop') {
          clearScheduledMessage();
          displayMessage({});
          return;
        }

        let mediaUrl = '';
        let mediaType = 'image/svg+xml';
        let isShort = false;

        if (format === 'landscape') {
          mediaUrl = '/client/img/landscape.svg';
        } else if (format === 'square') {
          mediaUrl = '/client/img/square.svg';
        } else if (format === 'portrait') {
          mediaUrl = '/client/img/portrait.svg';
          isShort = true;
        }

        const mockMessage = {
          author: 'Utilisateur Test',
          authorImage: 'https://archive.org/download/discordprofilepictures/discordblue.png',
          duration: 999999, // Set high duration so test remains active until closed
          content: JSON.stringify({
            text: `Test de format : ${format.toUpperCase()}`,
            mediaContentType: mediaType,
            media: mediaUrl,
            mediaIsShort: isShort
          })
        };

        displayMessage(mockMessage);
      };

      // Apply initial size/position from URL params
      const sizeParam = urlParams.get('size') || '960';
      const posParam = urlParams.get('position') || 'center';
      window.__updateLayoutSettings(sizeParam, posParam);

      function generateImg(src) {
        return '<img id="message-img" alt="" src="' + src + '" />';
      }

      function generateAudioVideo(src, mediaIsShort) {
        setTimeout(() => {
          (async () => {
            await VidstackPlayer.create({
              target: '#message-player',
              src: src,
              layout: new VidstackPlayerLayout({}),
              logLevel: 'debug',
              crossOrigin: true,
              playsInline: true,
              load: 'eager',
              autoplay: true,
              muted: isDesktop ? false : true,
            });

            const player = document.querySelector('media-player');

            // Listen to metadata loaded to adjust player ratio dynamically based on video size
            player.addEventListener('loaded-metadata', () => {
              const videoEl = player.querySelector('video');
              if (videoEl && videoEl.videoWidth && videoEl.videoHeight) {
                const ratio = videoEl.videoWidth / videoEl.videoHeight;
                player.style.setProperty('aspect-ratio', String(ratio), 'important');
              }
            });

            player.addEventListener(
              'can-play',
              async () => {
                try {
                  await player.play();
                  player.muted = false;
                } catch (e) {
                  console.warn('Autoplay blocked:', e);
                }
              },
              { once: true },
            );
          })();
        }, 100);

        return '<div id="message-player" ' + (mediaIsShort ? "class='is-short'" : '') + '></div>';
      }

      function displayAuthor(authorUsername, authorPictureURL) {
        var elementBlock = document.getElementById('author-block');
        var elementUsername = document.getElementById('author-username');
        var elementImg = document.getElementById('author-img');

        elementBlock.style.display = 'none';
        elementUsername.textContent = authorUsername || '';
        elementImg.src = authorPictureURL || 'https://archive.org/download/discordprofilepictures/discordblue.png';

        if (authorUsername || authorPictureURL) {
          elementBlock.style.display = 'inline-flex';
        }
      }

      function displayText(text) {
        var element = document.getElementById('message-text');
        element.style.display = 'none';

        if (text) {
          element.textContent = text;
          element.style.display = 'block';
        }
      }

      var serverClockOffset = null;
      var pendingDisplayTimeout;
      var syncSampleCount = 0;
      var syncSampleTotal = 0;

      function displayContent(data) {
        var element = document.getElementById('message-block');

        element.innerHTML = '';
        emptyState.style.display = 'none';

        if (data.mediaContentType) {
          if (data.mediaContentType.indexOf('image') === 0) {
            element.innerHTML = generateImg(data.media || data.url);
          } else {
            element.innerHTML = generateAudioVideo(data.media || data.url, data.mediaIsShort);
          }
        }
      }

      var timeout;

      function clearScheduledMessage() {
        if (timeout) {
          clearTimeout(timeout);
          timeout = null;
        }

        if (pendingDisplayTimeout) {
          clearTimeout(pendingDisplayTimeout);
          pendingDisplayTimeout = null;
        }
      }

      function getLocalTargetTime(serverTimestamp) {
        if (serverClockOffset === null) {
          return serverTimestamp;
        }

        return serverTimestamp - serverClockOffset;
      }

      function scheduleMessageDisplay(message) {
        clearScheduledMessage();

        var targetTime = getLocalTargetTime(message.displayAt || Date.now());
        var delay = targetTime - Date.now();

        pendingDisplayTimeout = setTimeout(() => {
          pendingDisplayTimeout = null;
          displayMessage(message);
        }, Math.max(0, delay));
      }

      function displayMessage(message) {
        console.debug('New message !', message);
        if (timeout) {
          clearTimeout(timeout);
        }
        if (message.duration) {
          timeout = setTimeout(() => {
            displayMessage({});
          }, message.duration * 1000 + 100);
        }

        var elementMessage = document.getElementById('message-block');
        var elementBlock = document.getElementById('author-block');
        var elementText = document.getElementById('message-text');
        elementMessage.innerHTML = '';
        elementBlock.style.display = 'none';
        elementText.style.display = 'none';

        if (message.author || message.authorImage) {
          displayAuthor(message.author, message.authorImage);
        }

        var data = JSON.parse(message.content || '{}');

        displayText(data.text);
        displayContent(data);

        if (!data.text && !data.mediaContentType) {
          if (!isDesktop) {
            emptyState.style.display = 'block';
          }
        }
      }

      function syncServerClock(socket) {
        var samplesLeft = 3;

        var runSample = () => {
          var clientSentAt = Date.now();

          socket.emit('sync-time', clientSentAt, (response) => {
            var roundTripTime = Date.now() - clientSentAt;
            var estimatedOffset = response.serverNow - (clientSentAt + roundTripTime / 2);

            syncSampleCount += 1;
            syncSampleTotal += estimatedOffset;
            serverClockOffset = syncSampleTotal / syncSampleCount;

            samplesLeft -= 1;

            if (samplesLeft > 0) {
              setTimeout(runSample, 150);
            }
          });
        };

        runSample();
      }

      document.addEventListener('DOMContentLoaded', function () {
        var socket = io({
          reconnection: true,
          reconnectionDelay: 1000,
          reconnectionDelayMax: 1000,
          reconnectionAttempts: 999,
        });

        socket.on('connect', () => {
          socket.emit('join-room', 'messages-' + urlParams.get('guildId'));
          syncServerClock(socket);
        });

        socket.on('new-message', function (data) {
          console.debug(data);
          scheduleMessageDisplay(data);
        });

        socket.on('stop', function () {
          console.debug('Media stopped !');
          clearScheduledMessage();
          displayMessage({});
        });
      });
    </script>
  </body>
</html>

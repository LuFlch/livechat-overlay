<!doctype html>
<html lang="fr">
  <head>
    <base href="/client/" />
    <title>LiveChatCCB</title>
    <script
      src="https://cdn.socket.io/4.7.4/socket.io.min.js"
      integrity="sha384-Gr6Lu2Ajx28mzwyVR8CFkULdCU7kMlZ9UthllibdOSo6qAiN+yXNHqtgdTvFXMT4"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./vidstack.theme.css" />
    <link rel="stylesheet" href="./vidstack.video.css" />
    <script src="./vidstack.js" type="module"></script>
    <style>
      :root {
        color-scheme: dark;
        --scale: 1; /* Set dynamically via JS */
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        pointer-events: none;
      }

      #overlay-root {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      #overlay-stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      #overlay-shell {
        position: relative;
        display: grid;
        gap: calc(14px * var(--scale));
        justify-items: center;
        align-items: center;
      }

      .message-frame {
        position: relative;
        z-index: 1;
        display: grid;
        gap: calc(12px * var(--scale));
        justify-items: center;
      }

      .message-badge {
        display: inline-flex;
        align-items: center;
        gap: calc(8px * var(--scale));
        padding: calc(6px * var(--scale)) calc(12px * var(--scale));
        border-radius: 999px;
        background: rgba(17, 24, 39, 0.74);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
      }

      #author-block {
        display: none;
        align-items: center;
      }

      #author-block img {
        width: calc(32px * var(--scale)) !important;
        height: calc(32px * var(--scale)) !important;
        border-radius: 999px;
        object-fit: cover;
      }

      #author-username {
        font-size: calc(14px * var(--scale));
        font-weight: 700;
        color: #eff6ff;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
      }

      #message-text {
        display: none;
        margin: 0;
        padding: calc(6px * var(--scale)) calc(10px * var(--scale));
        max-width: 100%;
        font-size: calc(2.6rem * var(--scale));
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #ffffff;
        text-align: center;
        text-shadow: 0 2px 18px rgba(0, 0, 0, 0.5);
      }

      /* Invisible 16:9 frame — sized by --overlay-size, zero visual style */
      #message-block {
        width: var(--overlay-size, 960px);
        height: calc(var(--overlay-size, 960px) * 9 / 16);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: transparent !important;
      }

      /* Wrapper inherits height so children can use height: 100% */
      #message-block #message-player {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent !important;
      }

      /* Player: always fills frame by height, width follows aspect-ratio */
      #message-block media-player {
        height: 100% !important;
        width: auto !important;
        aspect-ratio: 16 / 9;
        background: transparent !important;
        background-color: transparent !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      /* Portrait aspect-ratio override (is-short) */
      #message-block #message-player.is-short media-player {
        aspect-ratio: 9 / 16 !important;
      }

      /* Inner Vidstack elements fill the player — fully transparent */
      #message-block media-provider,
      #message-block [data-media-provider],
      #message-block video,
      #message-block audio {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
        background: transparent !important;
        background-color: transparent !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      /* Hide all Vidstack UI chrome */
      media-player [data-controls],
      .vds-controls,
      .vds-bezel,
      .vds-buffering-indicator,
      .vds-gestures,
      [data-media-player] .vds-controls-group,
      [data-media-player] .vds-gradient {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }

      /* Image: same height-fill logic, no added style */
      #message-block img {
        display: block;
        height: 100%;
        width: auto;
        object-fit: contain;
        background: transparent !important;
        box-shadow: none !important;
        border-radius: 0 !important;
      }

      .empty-state {
        display: none;
        color: rgba(226, 232, 240, 0.74);
        text-align: center;
        font-size: 14px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>

  <body>
    <button class="absolute z-50 rounded-full bg-red-500 px-4 text-white pointer-events-auto" id="disappear">
      Click on me so i can disappear <br />(Fix Autoplay, Browser Source > Right Click > Interact / Interragir <br />and
      click on button.)
    </button>

    <div id="overlay-root">
      <div id="overlay-stage">
        <div id="overlay-shell">
          <div class="message-frame">
            <div id="author-block" class="message-badge">
              <div class="w-fit">
                <img id="author-img" src="" alt="" />
              </div>
              <p id="author-username"></p>
            </div>

            <p id="message-text"></p>
            <div id="message-block"></div>
            <div id="empty-state" class="empty-state">LiveChat prêt</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { VidstackPlayer, VidstackPlayerLayout } from './vidstack.js';

      const overlayStage = document.getElementById('overlay-stage');
      const overlayShell = document.getElementById('overlay-shell');
      const emptyState = document.getElementById('empty-state');
      const disappearBtn = document.getElementById('disappear');

      // Check if we are running in the desktop client
      const urlParams = new URLSearchParams(globalThis.location.search);
      const isDesktop = urlParams.get('client') === 'desktop';

      if (disappearBtn) {
        if (isDesktop) {
          disappearBtn.style.display = 'none';
        } else {
          disappearBtn.addEventListener('click', () => {
            disappearBtn.style.display = 'none';
          });
        }
      }

      // Volume control — stores current level so new players inherit it
      var currentVolume = 1;

      globalThis.__setVolume = function(vol) {
        currentVolume = Math.max(0, Math.min(1, vol));
        document.querySelectorAll('audio, video').forEach(function(el) {
          el.volume = currentVolume;
          el.muted = currentVolume === 0;
        });
        var player = document.querySelector('media-player');
        if (player) { try { player.volume = currentVolume; } catch {} }
      };

      // Queue system
      var messageQueue = [];
      var isPlaying = false;
      var finishToken = 0;
      var displayTimeout = null;
      var pendingDisplayTimeout = null;

      function onContentDone(token) {
        if (token !== finishToken) return;
        isPlaying = false;
        if (displayTimeout) { clearTimeout(displayTimeout); displayTimeout = null; }
        playNext();
      }

      function clearDisplay() {
        var el = document.getElementById('message-block');
        var ab = document.getElementById('author-block');
        var mt = document.getElementById('message-text');
        if (el) el.innerHTML = '';
        if (ab) ab.style.display = 'none';
        if (mt) mt.style.display = 'none';
        if (!isDesktop) emptyState.style.display = 'block';
      }

      function playNext() {
        if (messageQueue.length === 0) {
          clearDisplay();
          return;
        }
        isPlaying = true;
        displayMessage(messageQueue.shift());
      }

      function enqueueMessage(message) {
        if (isPlaying || messageQueue.length > 0) {
          messageQueue.push(message);
        } else {
          isPlaying = true;
          displayMessage(message);
        }
      }

      // Real-time custom width and flex alignment setup
      globalThis.__updateLayoutSettings = function(size, position) {
        const scaleVal = Number(size) / 960;
        document.documentElement.style.setProperty('--scale', scaleVal);
        document.documentElement.style.setProperty('--overlay-size', `${size}px`);

        if (overlayStage) {
          overlayStage.style.alignItems = '';
          overlayStage.style.justifyContent = '';
          overlayStage.style.padding = '24px';

          if (position === 'top-left') {
            overlayStage.style.alignItems = 'flex-start';
            overlayStage.style.justifyContent = 'flex-start';
          } else if (position === 'top-center') {
            overlayStage.style.alignItems = 'flex-start';
            overlayStage.style.justifyContent = 'center';
          } else if (position === 'top-right') {
            overlayStage.style.alignItems = 'flex-start';
            overlayStage.style.justifyContent = 'flex-end';
          } else if (position === 'center-left') {
            overlayStage.style.alignItems = 'center';
            overlayStage.style.justifyContent = 'flex-start';
          } else if (position === 'center-right') {
            overlayStage.style.alignItems = 'center';
            overlayStage.style.justifyContent = 'flex-end';
          } else if (position === 'bottom-left') {
            overlayStage.style.alignItems = 'flex-end';
            overlayStage.style.justifyContent = 'flex-start';
          } else if (position === 'bottom-center') {
            overlayStage.style.alignItems = 'flex-end';
            overlayStage.style.justifyContent = 'center';
          } else if (position === 'bottom-right') {
            overlayStage.style.alignItems = 'flex-end';
            overlayStage.style.justifyContent = 'flex-end';
          } else {
            overlayStage.style.alignItems = 'center';
            overlayStage.style.justifyContent = 'center';
          }
        }
      };

      // Mock media formats testing
      globalThis.__triggerTestFormat = function(format) {
        if (format === 'stop') {
          if (pendingDisplayTimeout) { clearTimeout(pendingDisplayTimeout); pendingDisplayTimeout = null; }
          messageQueue = [];
          isPlaying = false;
          finishToken++;
          if (displayTimeout) { clearTimeout(displayTimeout); displayTimeout = null; }
          clearDisplay();
          return;
        }

        let mediaUrl = '';
        let mediaType = 'image/svg+xml';
        let isShort = false;

        if (format === 'landscape') {
          mediaUrl = './img/landscape.svg';
        } else if (format === 'square') {
          mediaUrl = './img/square.svg';
        } else if (format === 'portrait') {
          mediaUrl = './img/portrait.svg';
          isShort = true;
        }

        const mockMessage = {
          author: 'Utilisateur Test',
          authorImage: 'https://archive.org/download/discordprofilepictures/discordblue.png',
          duration: 999999, // Set high duration so test remains active until closed
          content: JSON.stringify({
            text: `Test de format : ${format.toUpperCase()}`,
            mediaContentType: mediaType,
            media: mediaUrl,
            mediaIsShort: isShort
          })
        };

        displayMessage(mockMessage);
      };

      // Apply initial size/position from URL params
      const sizeParam = urlParams.get('size') || '960';
      const posParam = urlParams.get('position') || 'center';
      globalThis.__updateLayoutSettings(sizeParam, posParam);

      function generateImg(src) {
        return '<img id="message-img" alt="" src="' + src + '" />';
      }

      function generateAudioVideo(src, mediaIsShort, onDone) {
        setTimeout(() => {
          (async () => {
            await VidstackPlayer.create({
              target: '#message-player',
              src: src,
              layout: new VidstackPlayerLayout({}),
              logLevel: 'debug',
              crossOrigin: true,
              playsInline: true,
              load: 'eager',
              autoplay: true,
              muted: !isDesktop,
            });

            const player = document.querySelector('media-player');

            // Apply stored volume to this new player
            try { player.volume = currentVolume; } catch {}
            var vid = player.querySelector('video');
            if (vid) { vid.volume = currentVolume; vid.muted = currentVolume === 0; }

            // Adjust player aspect-ratio to the video's real dimensions
            player.addEventListener('loaded-metadata', () => {
              const videoEl = player.querySelector('video');
              if (videoEl && videoEl.videoWidth && videoEl.videoHeight) {
                const { videoWidth, videoHeight } = videoEl;
                player.style.setProperty('aspect-ratio', `${videoWidth} / ${videoHeight}`, 'important');
                if (videoHeight > videoWidth) {
                  const wrapper = document.getElementById('message-player');
                  if (wrapper) wrapper.classList.add('is-short');
                }
              }
            });

            // When video ends, advance the queue
            player.addEventListener('ended', () => {
              console.debug('Video ended');
              if (onDone) onDone();
            });

            player.addEventListener(
              'can-play',
              async () => {
                try {
                  await player.play();
                  player.muted = false;
                  // Re-apply volume after unmute
                  try { player.volume = currentVolume; } catch {}
                  var v = player.querySelector('video');
                  if (v) v.volume = currentVolume;
                } catch (e) {
                  console.warn('Autoplay blocked:', e);
                }
              },
              { once: true },
            );
          })();
        }, 100);

        return '<div id="message-player" ' + (mediaIsShort ? "class='is-short'" : '') + '></div>';
      }

      function displayAuthor(authorUsername, authorPictureURL) {
        var elementBlock = document.getElementById('author-block');
        var elementUsername = document.getElementById('author-username');
        var elementImg = document.getElementById('author-img');

        elementBlock.style.display = 'none';
        elementUsername.textContent = authorUsername || '';
        elementImg.src = authorPictureURL || 'https://archive.org/download/discordprofilepictures/discordblue.png';

        if (authorUsername || authorPictureURL) {
          elementBlock.style.display = 'inline-flex';
        }
      }

      function displayText(text) {
        var element = document.getElementById('message-text');
        element.style.display = 'none';

        if (text) {
          element.textContent = text;
          element.style.display = 'block';
        }
      }

      var serverClockOffset = null;
      var pendingDisplayTimeout;
      var syncSampleCount = 0;
      var syncSampleTotal = 0;

      function displayContent(data, onDone) {
        var element = document.getElementById('message-block');

        element.innerHTML = '';
        emptyState.style.display = 'none';

        if (data.mediaContentType) {
          if (data.mediaContentType.indexOf('image') === 0) {
            element.innerHTML = generateImg(data.media || data.url);
          } else {
            element.innerHTML = generateAudioVideo(data.media || data.url, data.mediaIsShort, onDone);
          }
        }
      }

      function getLocalTargetTime(serverTimestamp) {
        if (serverClockOffset === null) {
          return serverTimestamp;
        }

        return serverTimestamp - serverClockOffset;
      }

      function scheduleMessageDisplay(message) {
        // Cancel any already-scheduled (but not yet displayed) item
        if (pendingDisplayTimeout) { clearTimeout(pendingDisplayTimeout); pendingDisplayTimeout = null; }

        var targetTime = getLocalTargetTime(message.displayAt || Date.now());
        var delay = targetTime - Date.now();

        pendingDisplayTimeout = setTimeout(() => {
          pendingDisplayTimeout = null;
          enqueueMessage(message);
        }, Math.max(0, delay));
      }

      function displayMessage(message) {
        console.debug('New message!', message);

        finishToken++;
        var myToken = finishToken;
        if (displayTimeout) { clearTimeout(displayTimeout); displayTimeout = null; }

        var elementMessage = document.getElementById('message-block');
        var elementBlock = document.getElementById('author-block');
        var elementText = document.getElementById('message-text');
        elementMessage.innerHTML = '';
        elementBlock.style.display = 'none';
        elementText.style.display = 'none';

        if (message.author || message.authorImage) {
          displayAuthor(message.author, message.authorImage);
        }

        var data;
        try {
          data = JSON.parse(message.content || '{}');
        } catch {
          console.warn('[Client] Malformed message content, skipping.');
          onContentDone(myToken);
          return;
        }

        displayText(data.text);

        function done() { onContentDone(myToken); }

        displayContent(data, done);

        // Duration timeout — fires if video ends early or content has no ended event (images)
        if (message.duration) {
          displayTimeout = setTimeout(done, message.duration * 1000 + 100);
        }

        if (!data.text && !data.mediaContentType) {
          if (!isDesktop) {
            emptyState.style.display = 'block';
          }
        }
      }

      function syncServerClock(socket) {
        var samplesLeft = 3;

        var runSample = () => {
          var clientSentAt = Date.now();

          socket.emit('sync-time', clientSentAt, (response) => {
            var roundTripTime = Date.now() - clientSentAt;
            var estimatedOffset = response.serverNow - (clientSentAt + roundTripTime / 2);

            syncSampleCount += 1;
            syncSampleTotal += estimatedOffset;
            serverClockOffset = syncSampleTotal / syncSampleCount;

            samplesLeft -= 1;

            if (samplesLeft > 0) {
              setTimeout(runSample, 150);
            }
          });
        };

        runSample();
      }

      document.addEventListener('DOMContentLoaded', function () {
        var socket = io({
          reconnection: true,
          reconnectionDelay: 1000,
          reconnectionDelayMax: 1000,
          reconnectionAttempts: 999,
        });

        socket.on('connect', () => {
          syncServerClock(socket);
        });

        socket.on('server:env', function (serverEnv) {
          const guildId = urlParams.get('guildId');
          const token = urlParams.get('token');
          if (!guildId) return;
          const roomId = serverEnv + ':messages-' + guildId;
          const roomPayload = token ? { id: roomId, token } : roomId;
          socket.emit('join-room', roomPayload);
        });

        socket.on('new-message', function (data) {
          console.debug(data);
          scheduleMessageDisplay(data);
        });

        socket.on('stop', function () {
          console.debug('Media stopped!');
          if (pendingDisplayTimeout) { clearTimeout(pendingDisplayTimeout); pendingDisplayTimeout = null; }
          messageQueue = [];
          isPlaying = false;
          finishToken++;
          if (displayTimeout) { clearTimeout(displayTimeout); displayTimeout = null; }
          clearDisplay();
        });

        socket.on('presence:update', function (data) {
          if (window.livechatOverlay && typeof window.livechatOverlay.reportPresence === 'function') {
            window.livechatOverlay.reportPresence(data);
          }
        });

        socket.on('userJoined', function (data) {
          if (window.livechatOverlay && typeof window.livechatOverlay.reportUserJoined === 'function') {
            window.livechatOverlay.reportUserJoined(data);
          }
        });

        socket.on('userLeft', function (data) {
          if (window.livechatOverlay && typeof window.livechatOverlay.reportUserLeft === 'function') {
            window.livechatOverlay.reportUserLeft(data);
          }
        });
      });
    </script>
  </body>
</html>
